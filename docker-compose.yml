name: assesspro

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-interview_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interview_platform}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-interview_platform}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      RUN_SEED: ${RUN_SEED:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@assess.io}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
      SEED_CANDIDATE_EMAIL: ${SEED_CANDIDATE_EMAIL:-candidate@assess.io}
      SEED_CANDIDATE_PASSWORD: ${SEED_CANDIDATE_PASSWORD:-Candidate@123}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-5000}:5000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-5173}:80'

volumes:
  postgres_data:
